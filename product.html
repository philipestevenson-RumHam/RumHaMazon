<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details — Philip's Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div>
        <div class="site-title">Philip's Store</div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="loading" id="loading">Loading product...</div>
    <div class="detail-layout" id="detail" style="display:none">

      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Back to all products
      </a>

      <div class="carousel" id="carousel">
        <div class="carousel-placeholder" id="carousel-placeholder">No images available</div>
      </div>

      <div class="thumbnails" id="thumbnails"></div>

      <h1 class="detail-title" id="product-name"></h1>

      <div class="price-card">
        <div class="price-row">
          <span class="my-price" id="my-price"></span>
          <span class="amazon-price" id="amazon-price"></span>
          <span class="discount-badge" id="discount-badge"></span>
        </div>
      </div>

      <div class="details-section">
        <h3>Details</h3>
        <p id="product-details"></p>
      </div>
    </div>
  </div>

  <div class="contact-bar">
    Interested? Reach out to me to arrange a purchase.
  </div>

  <script src="store.js"></script>
</body>
</html>
