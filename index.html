<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RumHamAzon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo-link">
        <img src="logo.png" alt="RumHamAzon" class="site-logo">
      </a>
      <div>
        <div class="site-title">RumHamAzon</div>
        <div class="item-count" id="item-count"></div>
      </div>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="search" placeholder="Search products...">
      </div>
    </div>
  </header>

  <div class="container">
    <div class="loading" id="loading">Loading products...</div>
    <div class="product-grid" id="product-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <p>No products found</p>
      <p>Try a different search term</p>
    </div>
  </div>

  <div class="contact-bar">
    Interested in something? Reach out to me to arrange a purchase.
  </div>

  <script src="store.js"></script>
</body>
</html>
