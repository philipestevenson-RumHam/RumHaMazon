
<div style="padding: 1rem 0;">
  <h2 class="sr-only">Amazon description cleaner for CSV</h2>

  <div style="display: flex; flex-direction: column; gap: 1rem;">
    <div>
      <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">Paste Amazon description</label>
      <textarea id="input" placeholder="Paste the full Amazon description here..." style="width: 100%; height: 180px; font-size: 13px; font-family: var(--font-mono); padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); resize: vertical;"></textarea>
    </div>

    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <button onclick="clean()" style="padding: 6px 16px; font-size: 13px;">Clean & copy</button>
      <button onclick="document.getElementById('input').value=''; document.getElementById('output').value=''; setStatus('');" style="padding: 6px 16px; font-size: 13px;">Clear</button>
    </div>

    <div>
      <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px;">CSV-ready output</label>
      <textarea id="output" readonly placeholder="Cleaned output will appear here..." style="width: 100%; height: 180px; font-size: 13px; font-family: var(--font-mono); padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-primary); resize: vertical;"></textarea>
    </div>

    <div id="status" style="font-size: 13px; color: var(--color-text-secondary); min-height: 20px;"></div>
  </div>
</div>

<script>
function clean() {
  let text = document.getElementById('input').value;
  if (!text.trim()) { setStatus('Nothing to clean.'); return; }

  text = text.replace(/^About this item\s*/i, '');
  text = text.replace(/^\s*\*\s*/gm, '');
  text = text.replace(/【[^】]*】\s*/g, '');
  text = text.replace(/[ \t]{2,}/g, ' ');
  text = text.replace(/\n{3,}/g, '\n\n');
  text = text.trim();
  text = text.replace(/"/g, '""');
  const result = '"' + text + '"';

  document.getElementById('output').value = result;

  navigator.clipboard.writeText(result).then(() => {
    setStatus('Copied to clipboard — paste straight into your CSV.');
  }).catch(() => {
    setStatus('Done — select all in the output box and copy manually.');
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
